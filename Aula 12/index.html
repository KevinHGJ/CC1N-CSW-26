<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flexbox Pokémon</title>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h2{
      color: #2c3e50;
    }

    /* EXERCÍCIO 1 */
    .pokedex{
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .pokemon{
      background: #ffcb05;
      color: #2a75bb;
      padding: 20px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* EXERCÍCIO 2 */
    .iniciais{
      display: flex;
      flex-grow: 1;
      margin-bottom: 40px;
      gap: 10px;
    }

    .starter{
      flex-grow: 1;
      padding: 25px;
      text-align: center;
      font-weight: bold;
      border-bottom: 5px solid transparent;
      border-radius: 10px;
      transition: 0.3s;
      color: white;
    }

    .bulbasaur{
      background: #4caf50;
    }

    .charmander{
      background: #ff5722;
    }

    .squirtle{
      background: #2196f3;
    }

    .starter:hover{
      border-bottom: 5px solid black;
      transform: scale(1.05);
    }

    /* EXERCÍCIO 3 */
    .lendarios{
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .lendario{
      flex-grow: 1;
      padding: 20px;
      text-align: center;
      color: white;
      border-radius: 10px;
      transition: 0.3s;
      font-weight: bold;
    }

    .mewtwo{
      background: purple;
      flex-grow: 2;
    }

    .lugia{
      background: steelblue;
    }

    .hooh{
      background: crimson;
    }

    .rayquaza{
      background: seagreen;
    }

    .giratina{
      background: darkgoldenrod;
    }

    .lendario:hover{
      background: black;
      cursor: pointer;
    }

    /* EXERCÍCIO 4 */
    .pokebolas{
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      background: #ddd;
      padding: 20px;
      border-radius: 10px;
    }

    .bola{
      background: red;
      color: white;
      padding: 15px;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <h2>Exercício 1 - Pokédex Flexbox</h2>

  <div class="pokedex">
    <div class="pokemon">Pikachu ⚡</div>
    <div class="pokemon">Eevee 🌟</div>
    <div class="pokemon">Snorlax 😴</div>
  </div>


  <h2>Exercício 2 - Pokémon Iniciais</h2>

  <div class="iniciais">
    <div class="starter bulbasaur">Bulbasaur 🍃</div>
    <div class="starter charmander">Charmander 🔥</div>
    <div class="starter squirtle">Squirtle 💧</div>
  </div>


  <h2>Exercício 3 - Pokémon Lendários</h2>

  <div class="lendarios">
    <div class="lendario mewtwo">Mewtwo</div>
    <div class="lendario lugia">Lugia</div>
    <div class="lendario hooh">Ho-Oh</div>
    <div class="lendario rayquaza">Rayquaza</div>
    <div class="lendario giratina">Giratina</div>
  </div>


  <h2>Exercício 4 - Pokébolas à Direita</h2>

  <div class="pokebolas">
    <div class="bola">⚪</div>
    <div class="bola">🔴</div>
    <div class="bola">🟡</div>
  </div>

</body>
</html>
